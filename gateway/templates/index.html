<!DOCTYPE html>
<html>
<head>
    <title>Microservices App</title>
</head>
<body>

<h1>🚀 Microservices Dashboard</h1>

<h2>Users</h2>
<ul>
{% for user in users %}
<li>{{ user.name }}</li>
{% endfor %}
</ul>

<h2>Tasks</h2>
<ul>
{% for task in tasks %}
<li>{{ task.task }}</li>
{% endfor %}
</ul>

</body>
</html>
