<!DOCTYPE html>
<html>
<head>
    <title>Microservices Dashboard</title>
</head>
<body>

<h1>🚀 Microservices Dashboard</h1>

<!-- USERS -->
<h2>Users</h2>
<ul>
  {% for user in users %}
    <li>{{ user.name }}</li>
  {% endfor %}
</ul>

<!-- ADD USER -->
<form action="http://localhost:3001/users" method="post">
    <input type="text" name="name" placeholder="Enter name" required>
    <button type="submit">Add User</button>
</form>

<a href="http://localhost:3001/users" target="_blank">👉 Open User API</a>

<hr>

<!-- TASKS -->
<h2>Tasks</h2>
<ul>
  {% for task in tasks %}
    <li>{{ task.task }}</li>
  {% endfor %}
</ul>

<!-- ADD TASK -->
<form action="http://localhost:3002/tasks" method="post">
    <input type="text" name="task" placeholder="Enter task" required>
    <button type="submit">Add Task</button>
</form>

<a href="http://localhost:3002/tasks" target="_blank">👉 Open Task API</a>

</body>
</html>
