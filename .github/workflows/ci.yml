name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r gateway/requirements.txt
        pip install -r user-service/requirements.txt
        pip install -r task-service/requirements.txt

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gateway ./gateway
        docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/task-service ./task-service

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/gateway
        docker push ${{ secrets.DOCKER_USERNAME }}/user-service
        docker push ${{ secrets.DOCKER_USERNAME }}/task-service